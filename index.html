const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID_HERE";
const GCAL_CONFIGURED = !GOOGLE_CLIENT_ID.includes("YOUR_");

// ── Google Calendar API Helpers ──
const GCal = {
  accessToken: null,
  calendarId: null,

  async getToken() {
    return new Promise((resolve, reject) => {
      if (!GCAL_CONFIGURED || !window.google?.accounts?.oauth2) {
        reject(new Error("Google not loaded"));
        return;
      }
      const client = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: "https://www.googleapis.com/auth/calendar",
        callback: (resp) => {
          if (resp.error) { reject(resp); return; }
          GCal.accessToken = resp.access_token;
          resolve(resp.access_token);
        }
      });
      client.requestAccessToken();
    });
  },

  async api(path, method = "GET", body = null) {
    if (!GCal.accessToken) throw new Error("Not authenticated");
    const opts = {
      method,
      headers: { Authorization: "Bearer " + GCal.accessToken, "Content-Type": "application/json" }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch("https://www.googleapis.com/calendar/v3" + path, opts);
    if (res.status === 401) { GCal.accessToken = null; throw new Error("Token expired"); }
    if (res.status === 204) return null;
    return res.json();
  },

  async findOrCreateCalendar() {
    const list = await GCal.api("/users/me/calendarList");
    const existing = list.items?.find(c => c.summary === "Family Hub");
    if (existing) { GCal.calendarId = existing.id; return existing.id; }
    const created = await GCal.api("/calendars", "POST", {
      summary: "Family Hub",
      description: "Synced from Family Hub app",
      timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
    });
    GCal.calendarId = created.id;
    return created.id;
  },

  parseTime(timeStr) {
    if (!timeStr) return { hours: 9, minutes: 0 };
    const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)?/i);
    if (!match) return { hours: 9, minutes: 0 };
    let hours = parseInt(match[1]);
    const minutes = parseInt(match[2]);
    const ampm = (match[3] || "").toUpperCase();
    if (ampm === "PM" && hours < 12) hours += 12;
    if (ampm === "AM" && hours === 12) hours = 0;
    return { hours, minutes };
  },

  buildEventBody(item) {
    const person = ["alex","jess","oliver","sydney"].includes(item.person)
      ? item.person.charAt(0).toUpperCase() + item.person.slice(1) : item.person;
    const { hours, minutes } = GCal.parseTime(item.time);
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const startDt = new Date(item.date + "T00:00:00");
    startDt.setHours(hours, minutes, 0);
    const endDt = new Date(startDt);
    endDt.setHours(endDt.getHours() + 1);
    const fmt = d => d.toISOString().replace("Z", "");
    const description = [
      `Assigned to: ${person}`,
      item.type ? `Type: ${item.type}` : "",
      item.needs ? `⚠️ Needs: ${item.needs}` : "",
      item.value ? `Value: $${Number(item.value).toFixed(2)}` : ""
    ].filter(Boolean).join("\n");

    return {
      summary: `[${person}] ${item.title}`,
      description,
      start: { dateTime: fmt(startDt), timeZone: tz },
      end: { dateTime: fmt(endDt), timeZone: tz },
      colorId: { alex: "7", jess: "3", oliver: "5", sydney: "6" }[item.person] || "1"
    };
  },

  async createEvent(item) {
    if (!GCal.accessToken || !GCal.calendarId) return null;
    try {
      const body = GCal.buildEventBody(item);
      const evt = await GCal.api(`/calendars/${encodeURIComponent(GCal.calendarId)}/events`, "POST", body);
      return evt?.id || null;
    } catch (e) { console.error("GCal create error:", e); return null; }
  },

  async updateEvent(gcalEventId, item) {
    if (!GCal.accessToken || !GCal.calendarId || !gcalEventId) return;
    try {
      const body = GCal.buildEventBody(item);
      await GCal.api(`/calendars/${encodeURIComponent(GCal.calendarId)}/events/${gcalEventId}`, "PUT", body);
    } catch (e) { console.error("GCal update error:", e); }
  },

  async deleteEvent(gcalEventId) {
    if (!GCal.accessToken || !GCal.calendarId || !gcalEventId) return;
    try {
      await GCal.api(`/calendars/${encodeURIComponent(GCal.calendarId)}/events/${gcalEventId}`, "DELETE");
    } catch (e) { console.error("GCal delete error:", e); }
  }
};

// ── Firebase Helpers ──
function useFirebaseCollection(path, demoData) {
  const [data, setData] = useState(IS_CONFIGURED ? [] : demoData);
  const [loaded, setLoaded] = useState(!IS_CONFIGURED);

  useEffect(() => {
    if (!IS_CONFIGURED || !db) return;
    const ref = db.ref(path);
    ref.on("value", (snap) => {
      const val = snap.val();
      if (val) {
        const arr = Object.entries(val).map(([key, v]) => ({ ...v, _fbKey: key }));
        setData(arr);
      } else {
        setData([]);
      }
      setLoaded(true);
    });
    return () => ref.off();
  }, [path]);

  const add = useCallback((item) => {
    if (IS_CONFIGURED && db) {
      const ref = db.ref(path).push();
      ref.set({ ...item, id: ref.key });
    } else {
      setData(prev => [...prev, { ...item, id: "local_" + Date.now() }]);
    }
  }, [path]);

  const update = useCallback((id, updates) => {
    if (IS_CONFIGURED && db) {
      const item = data.find(d => d.id === id || d._fbKey === id);
      const key = item?._fbKey || item?.id;
      if (key) db.ref(path + "/" + key).update(updates);
    } else {
      setData(prev => prev.map(d => d.id === id ? { ...d, ...updates } : d));
    }
  }, [path, data]);

  const remove = useCallback((id) => {
    if (IS_CONFIGURED && db) {
      const item = data.find(d => d.id === id || d._fbKey === id);
      const key = item?._fbKey || item?.id;
      if (key) db.ref(path + "/" + key).remove();
    } else {
      setData(prev => prev.filter(d => d.id !== id));
    }
  }, [path, data]);

  return { data, loaded, add, update, remove };
}

// ── Utility Functions ──
function formatDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function getWeekDates(baseDate) {
  const start = new Date(baseDate);
  const day = start.getDay();
  start.setDate(start.getDate() - day);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return dateKey(d);
  });
}

function dateKey(d) { return d.toISOString().split("T")[0]; }

function todayKey() { return dateKey(new Date()); }

  const [confirmDelete, setConfirmDelete] = useState(null);
  const [gcalConnected, setGcalConnected] = useState(false);

  // Firebase-backed collections
  const activitiesColl = useFirebaseCollection("activities", DEMO_ACTIVITIES);
  const choresColl = useFirebaseCollection("chores", DEMO_CHORES);
  const rewardsColl = useFirebaseCollection("rewards", DEMO_REWARDS);

  // ── Recurring Chore Logic ──
  function choreAppliesToDate(chore, dateStr) {
    const start = chore.startDate || chore.date || "2000-01-01";
    if (dateStr < start) return false;
    if (chore.frequency === "daily") return true;
    if (chore.frequency === "weekly") {
      const targetDay = new Date(dateStr + "T00:00:00").getDay();
      const choreDay = chore.dayOfWeek != null ? chore.dayOfWeek : new Date(start + "T00:00:00").getDay();
      return targetDay === choreDay;
    }
    if (chore.frequency === "one-time") return dateStr === start;
    return dateStr === start; // fallback for legacy data with no frequency
  }

  function getChoresForDate(dateStr, personFilter) {
    return choresColl.data
      .filter(c => choreAppliesToDate(c, dateStr))
      .filter(c => personFilter === "all" || c.person === personFilter)
      .map(c => {
        const choreKey = (c.id || c._fbKey) + "_" + dateStr;
        const completion = completionsColl.data.find(comp => comp.choreKey === choreKey);
        return {
          ...c,
          date: dateStr,
          done: !!completion?.done,
          _choreKey: choreKey,
          _source: "chore",
          type: "chore",
          time: c.time || "",
          needs: ""
        };
      });
  }

  // Merge activities + recurring chores into one calendar feed for a given date
  function getCalendarItemsForDate(dateStr) {
    const acts = activitiesColl.data
      .filter(a => a.date === dateStr)
      .map(a => ({ ...a, _source: "activity" }));
    const chores = getChoresForDate(dateStr, "all");
    return [...acts, ...chores].sort((a, b) => (a.time || "").localeCompare(b.time || ""));
  }

  const filteredCalendarItems = getCalendarItemsForDate(selectedDate)
    .filter(a => filterPerson === "all" || a.person === filterPerson);

  const todayActivities = filteredCalendarItems;

  const todayChores = getChoresForDate(selectedDate, filterPerson)
    .sort((a, b) => (a.done ? 1 : 0) - (b.done ? 1 : 0));

  const toggleChore = (chore) => {
    const choreKey = chore._choreKey || (chore.id || chore._fbKey) + "_" + selectedDate;
    const existing = completionsColl.data.find(c => c.choreKey === choreKey);
    if (existing) {
      completionsColl.update(existing.id || existing._fbKey, { done: !existing.done });
    } else {
      completionsColl.add({ choreKey, choreId: chore.id || chore._fbKey, date: chore.date || selectedDate, done: true });
    }
  };

  const deleteItem = async () => {
    if (!confirmDelete) return;
    const { type, item } = confirmDelete;
    if (item.gcalEventId && GCal.accessToken && GCal.calendarId) {
      await GCal.deleteEvent(item.gcalEventId);
    }
    if (type === "activity") activitiesColl.remove(item.id || item._fbKey);
    else if (type === "chore") choresColl.remove(item.id || item._fbKey);
    else if (type === "reward") rewardsColl.remove(item.id || item._fbKey);
    setConfirmDelete(null);
  };

  const kidRewardTotals = FAMILY.filter(f => f.role === "kid").map(kid => {
    const entries = rewardsColl.data.filter(r => r.person === kid.id);
    const total = entries.reduce((sum, r) => sum + Number(r.amount), 0);
    const todayDoneChores = getChoresForDate(selectedDate, kid.id).filter(c => c.done);
    const todayEarned = todayDoneChores.reduce((sum, c) => sum + Number(c.value || 0), 0);
    return { ...kid, entries, total, todayEarned };
  });
  const connectGCal = async () => {
    try {
      await GCal.getToken();
      await GCal.findOrCreateCalendar();
      setGcalConnected(true);
      // Store calendar ID in Firebase for other devices
      if (db) db.ref("settings/gcalCalendarId").set(GCal.calendarId);
    } catch (e) {
      console.error("GCal connect failed:", e);
      alert("Could not connect to Google Calendar. Make sure pop-ups are allowed.");
    }
  };

  // Restore calendar ID from Firebase if previously connected
  useEffect(() => {
    if (!db) return;
    db.ref("settings/gcalCalendarId").on("value", (snap) => {
      const id = snap.val();
      if (id) GCal.calendarId = id;
    });
  }, []);

  const syncAllToGCal = async () => {
    if (!gcalConnected) { await connectGCal(); }
    if (!GCal.accessToken || !GCal.calendarId) return;
    setGcalSyncing(true);
    try {
      const items = [...activitiesColl.data, ...choresColl.data];
      for (const item of items) {
        if (item.gcalEventId) continue; // already synced
        const gcalId = await GCal.createEvent(item);
        if (gcalId) {
          const coll = item.frequency ? choresColl : activitiesColl;
          coll.update(item.id || item._fbKey, { gcalEventId: gcalId });
        }
      }
    } catch (e) { console.error("Sync error:", e); }
    setGcalSyncing(false);
  };

  // Form state
  const [formTitle, setFormTitle] = useState("");
  const [formPerson, setFormPerson] = useState("oliver");
  const [formType, setFormType] = useState("event");
  const [formDate, setFormDate] = useState(todayKey());
  const [formTime, setFormTime] = useState("9:00 AM");
  const [formNeeds, setFormNeeds] = useState("");
  const [formValue, setFormValue] = useState("1.00");
  const [formFreq, setFormFreq] = useState("daily");
  const [formRewardType, setFormRewardType] = useState("bonus");
  const [formNote, setFormNote] = useState("");

  const weekDates = useMemo(() => getWeekDates(new Date(selectedDate + "T00:00:00")), [selectedDate]);

  const handleAdd = async () => {
    if (!formTitle.trim()) return;
    let item;
    if (addType === "activity") {
      item = { title: formTitle, type: formType, person: formPerson, date: formDate, time: formTime, needs: formNeeds };
    } else if (addType === "chore") {
      const dayOfWeek = new Date(formDate + "T00:00:00").getDay();
      item = { title: formTitle, person: formPerson, value: parseFloat(formValue) || 0, frequency: formFreq, startDate: formDate, dayOfWeek };
    } else {
      item = null;
    }

    if (addType === "reward") {
      const amt = parseFloat(formValue) || 0;
      rewardsColl.add({ person: formPerson, amount: formRewardType === "penalty" ? -amt : amt, type: formRewardType, note: formNote || formTitle, date: formDate });
    } else {
      // Create in Firebase
      const coll = addType === "activity" ? activitiesColl : choresColl;
      coll.add(item);

      // Sync to Google Calendar if connected
      if (gcalConnected && GCal.accessToken && GCal.calendarId) {
        const gcalId = await GCal.createEvent(item);
        // We'll update the Firebase record with gcalEventId on next sync
        // (item doesn't have its Firebase key yet at this point)
      }
    }
    setShowAddModal(false);
    setFormTitle(""); setFormNeeds(""); setFormNote("");
  };

  const navigateDay = (dir) => {
    const d = new Date(selectedDate + "T00:00:00");
    d.setDate(d.getDate() + dir);
    setSelectedDate(dateKey(d));
  };

  const navigateWeek = (dir) => {
    const d = new Date(selectedDate + "T00:00:00");
    d.setDate(d.getDate() + dir * 7);
    setSelectedDate(dateKey(d));
  };

  const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 10, border: "1.5px solid #E0E0E0", fontSize: 14, outline: "none", fontFamily: "inherit", boxSizing: "border-box" };
  const selectStyle = { ...inputStyle, background: "#fff", WebkitAppearance: "none" };
  const labelStyle = { fontSize: 12, fontWeight: 600, color: "#666", marginBottom: 4, display: "block" };

  return (
    <div style={{ background: "#F4F5F9", minHeight: "100vh" }}>

      {/* ── Header ── */}
      <div style={{ background: "linear-gradient(135deg, #2D3436 0%, #434E52 100%)", padding: "env(safe-area-inset-top, 12px) 20px 16px", color: "#fff" }}>
        <div style={{ paddingTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.5 }}>🏠 Family Hub</div>
            <div style={{ fontSize: 12, color: "#A8B2B7", marginTop: 2 }}>{formatDate(selectedDate)}</div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {GCAL_CONFIGURED && (
              <button onClick={gcalConnected ? syncAllToGCal : connectGCal} style={{
                height: 42, padding: "0 14px", borderRadius: 12, border: "none",
                background: gcalConnected ? "rgba(39,174,96,0.25)" : "rgba(255,255,255,0.15)",
                color: "#fff", fontSize: 12, fontWeight: 600,
                cursor: "pointer", display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap"
              }}>
                {gcalSyncing ? "⏳" : gcalConnected ? "📅 ✓" : "📅 Sync"}
                {!gcalConnected && " GCal"}
              </button>
            )}
            <button onClick={() => { setShowAddModal(true); setAddType("activity"); }} style={{
              width: 42, height: 42, borderRadius: 12, border: "none",
              background: "rgba(255,255,255,0.15)", color: "#fff", fontSize: 26,
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
            }}>+</button>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 14, overflowX: "auto", paddingBottom: 4, WebkitOverflowScrolling: "touch" }}>
          <button onClick={() => setFilterPerson("all")} style={{
            padding: "6px 14px", borderRadius: 20, border: "none", cursor: "pointer",
            fontSize: 12, fontWeight: 600,
            background: filterPerson === "all" ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.08)",
            color: "#fff", whiteSpace: "nowrap"
          }}>All</button>
          {FAMILY.map(f => (
            <button key={f.id} onClick={() => setFilterPerson(f.id)} style={{
              padding: "6px 14px", borderRadius: 20, border: "none", cursor: "pointer",
              fontSize: 12, fontWeight: 600,
              background: filterPerson === f.id ? f.color + "40" : "rgba(255,255,255,0.08)",
              color: "#fff", whiteSpace: "nowrap"
            }}>{f.emoji} {f.name}</button>
          ))}
        </div>
      </div>

      {/* ── Tab Bar ── */}
      <div style={{ display: "flex", background: "#fff", borderBottom: "1px solid #E8E8E8", position: "sticky", top: 0, zIndex: 50 }}>
        {[
          { key: "calendar", label: "📅 Calendar" },
          { key: "chores", label: "🧹 Chores" },
          { key: "rewards", label: "💰 Rewards" }
        ].map(t => (
          <button key={t.key} onClick={() => setTab(t.key)} style={{
            flex: 1, padding: "12px 0", border: "none", cursor: "pointer",
            fontSize: 13, fontWeight: 600, background: "transparent",
            color: tab === t.key ? "#2D3436" : "#999",
            borderBottom: tab === t.key ? "3px solid #2D3436" : "3px solid transparent"
          }}>{t.label}</button>
        ))}
      </div>

      <SetupBanner />

      {/* ── Content ── */}
      <div style={{ padding: "12px 16px 120px" }}>

        {/* ═══ CALENDAR ═══ */}
        {tab === "calendar" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ display: "flex", background: "#E8E8E8", borderRadius: 10, overflow: "hidden" }}>
                {["day", "week"].map(v => (
                  <button key={v} onClick={() => setCalView(v)} style={{
                    padding: "7px 18px", border: "none", cursor: "pointer",
                    fontSize: 13, fontWeight: 600, textTransform: "capitalize",
                    background: calView === v ? "#2D3436" : "transparent",
                    color: calView === v ? "#fff" : "#666"
                  }}>{v}</button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => calView === "day" ? navigateDay(-1) : navigateWeek(-1)} style={{ width: 34, height: 34, borderRadius: 8, border: "1px solid #ddd", background: "#fff", cursor: "pointer", fontSize: 16 }}>←</button>
                <button onClick={() => setSelectedDate(todayKey())} style={{ padding: "0 12px", height: 34, borderRadius: 8, border: "1px solid #ddd", background: "#fff", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#666" }}>Today</button>
                <button onClick={() => calView === "day" ? navigateDay(1) : navigateWeek(1)} style={{ width: 34, height: 34, borderRadius: 8, border: "1px solid #ddd", background: "#fff", cursor: "pointer", fontSize: 16 }}>→</button>
              </div>
            </div>

            {calView === "day" ? (
              <div>
                {todayActivities.length === 0 ? (
                  <div style={{ textAlign: "center", padding: 48, color: "#999", fontSize: 14 }}>Nothing scheduled for this day.</div>
                ) : todayActivities.map(a => (
                  <ActivityCard key={a._choreKey || a.id || a._fbKey} activity={a} onExpand={setExpandedActivity} />
                ))}
              </div>
            ) : (
              <div>
                {weekDates.map(wd => {
                  const dayActs = getCalendarItemsForDate(wd).filter(a => filterPerson === "all" || a.person === filterPerson);
                  const isToday = wd === todayKey();
                  return (
                    <div key={wd} style={{ marginBottom: 10 }}>
                      <div onClick={() => { setSelectedDate(wd); setCalView("day"); }} style={{
                        display: "flex", alignItems: "center", gap: 10, padding: "8px 0",
                        cursor: "pointer", borderBottom: "1px solid #eee"
                      }}>
                        <div style={{
                          width: 38, height: 38, borderRadius: 10, display: "flex",
                          flexDirection: "column", alignItems: "center", justifyContent: "center",
                          background: isToday ? "#2D3436" : "transparent",
                          color: isToday ? "#fff" : "#2D3436", flexShrink: 0
                        }}>
                          <div style={{ fontSize: 9, fontWeight: 700, textTransform: "uppercase", lineHeight: 1 }}>
                            {new Date(wd + "T00:00:00").toLocaleDateString("en-US", { weekday: "short" })}
                          </div>
                          <div style={{ fontSize: 15, fontWeight: 700, lineHeight: 1.2 }}>
                            {new Date(wd + "T00:00:00").getDate()}
                          </div>
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          {dayActs.length === 0 ? (
                            <span style={{ fontSize: 12, color: "#bbb" }}>No events</span>
                          ) : (
                            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                              {dayActs.map(a => {
                                const person = FAMILY.find(f => f.id === a.person);
                                const isChoreItem = a._source === "chore";
                                return (
                                  <div key={a._choreKey || a.id || a._fbKey} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, opacity: isChoreItem && a.done ? 0.5 : 1 }}>
                                    <div style={{ width: 7, height: 7, borderRadius: 4, background: person?.color || "#ccc", flexShrink: 0 }} />
                                    {isChoreItem && a.done && <span style={{ fontSize: 10, flexShrink: 0 }}>✓</span>}
                                    <span style={{ fontWeight: 500, color: "#2D3436", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: isChoreItem && a.done ? "line-through" : "none" }}>{a.title}</span>
                                    <span style={{ color: "#999", marginLeft: "auto", fontSize: 11, flexShrink: 0 }}>{a.time}</span>
                                    {a.needs && <span style={{ fontSize: 10, flexShrink: 0 }}>⚠️</span>}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ═══ CHORES ═══ */}
        {tab === "chores" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 14, color: "#666" }}>
                {todayChores.filter(c => c.done).length}/{todayChores.length} done
              </div>
              <button onClick={() => { setShowAddModal(true); setAddType("chore"); }} style={{
                padding: "7px 16px", borderRadius: 8, border: "none",
                background: "#2D3436", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer"
              }}>+ Add Chore</button>
            </div>
            <div style={{ height: 6, borderRadius: 3, background: "#E8E8E8", marginBottom: 16, overflow: "hidden" }}>
              <div style={{
                height: "100%", borderRadius: 3, background: "linear-gradient(90deg, #27AE60, #2ECC71)",
                width: todayChores.length > 0 ? `${(todayChores.filter(c => c.done).length / todayChores.length) * 100}%` : "0%",
                transition: "width 0.3s"
              }} />
            </div>
            {todayChores.length === 0 ? (
              <div style={{ textAlign: "center", padding: 48, color: "#999", fontSize: 14 }}>No chores for this day.</div>
            ) : todayChores.map(c => (
              <ChoreRow key={c._choreKey || c.id || c._fbKey} chore={c} onToggle={toggleChore} onDelete={(item) => setConfirmDelete({ type: "chore", item })} />
            ))}
          </div>
        )}

        {/* ═══ REWARDS ═══ */}
        {tab === "rewards" && (
          <div>
            <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
              {kidRewardTotals.map(kid => (
                <div key={kid.id} style={{
                  flex: 1, padding: "14px 12px", borderRadius: 14,
                  background: "#fff", boxShadow: "0 2px 8px rgba(0,0,0,0.06)",
                  borderTop: `4px solid ${kid.color}`
                }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#666", marginBottom: 2 }}>{kid.emoji} {kid.name}</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: kid.total >= 0 ? "#27AE60" : "#E74C3C" }}>
                    ${kid.total.toFixed(2)}
                  </div>
                  {kid.todayEarned > 0 && (
                    <div style={{ fontSize: 11, color: "#27AE60", marginTop: 4 }}>+${kid.todayEarned.toFixed(2)} today</div>
                  )}
                </div>
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#2D3436" }}>History</div>
              <button onClick={() => { setShowAddModal(true); setAddType("reward"); }} style={{
                padding: "7px 16px", borderRadius: 8, border: "none",
                background: "#2D3436", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer"
              }}>+ Bonus / Penalty</button>
            </div>
            {[...rewardsColl.data].sort((a, b) => (b.date || "").localeCompare(a.date || "")).map(r => {
              const person = FAMILY.find(f => f.id === r.person);
              return (
                <div key={r.id || r._fbKey} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "10px 14px",
                  background: "#fff", borderRadius: 12, marginBottom: 6,
                  borderLeft: `4px solid ${person?.color || "#ccc"}`,
                  boxShadow: "0 1px 3px rgba(0,0,0,0.05)"
                }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 600, fontSize: 13, color: "#2D3436" }}>{r.note}</div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 3 }}>
                      <PersonPill personId={r.person} small />
                      <span style={{ fontSize: 11, color: "#999" }}>{formatDate(r.date)}</span>
                    </div>
                  </div>
                  <div style={{ fontWeight: 700, fontSize: 15, whiteSpace: "nowrap", color: Number(r.amount) >= 0 ? "#27AE60" : "#E74C3C" }}>
                    {Number(r.amount) >= 0 ? "+" : ""}${Number(r.amount).toFixed(2)}
                  </div>
                  <button onClick={() => setConfirmDelete({ type: "reward", item: r })} style={{
                    background: "none", border: "none", fontSize: 16, color: "#ccc", cursor: "pointer", padding: "4px"
                  }}>×</button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* ── Expanded Activity Modal ── */}
      <Modal open={!!expandedActivity} onClose={() => setExpandedActivity(null)} title={expandedActivity?.title || ""}>
        {expandedActivity && (() => {
          const isChore = expandedActivity._source === "chore";
          const person = FAMILY.find(f => f.id === expandedActivity.person);
          const isKid = person?.role === "kid";
          return (
            <div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
                <PersonPill personId={expandedActivity.person} />
                <TypeBadge type={expandedActivity.type} />
              </div>
              <div style={{ fontSize: 14, color: "#555", marginBottom: 8 }}><strong>Date:</strong> {formatDate(expandedActivity.date)}</div>
              {expandedActivity.time && (
                <div style={{ fontSize: 14, color: "#555", marginBottom: 8 }}><strong>Time:</strong> {expandedActivity.time}</div>
              )}
              {isChore && isKid && expandedActivity.value > 0 && (
                <div style={{ fontSize: 14, color: "#555", marginBottom: 8 }}><strong>Value:</strong> ${Number(expandedActivity.value).toFixed(2)}</div>
              )}
              {isChore && (
                <div style={{ fontSize: 14, color: "#555", marginBottom: 8 }}><strong>Status:</strong> {expandedActivity.done ? "✅ Complete" : "⬜ Not done"}</div>
              )}
              {expandedActivity.needs && (
                <div style={{ padding: "10px 14px", background: "#FFF9E6", borderRadius: 10, fontSize: 13, color: "#8B6914", marginTop: 8 }}>
                  <strong>⚠️ What to bring / wear:</strong><br />{expandedActivity.needs}
                </div>
              )}
              {isChore && (
                <button onClick={() => {
                  toggleChore(expandedActivity);
                  setExpandedActivity({ ...expandedActivity, done: !expandedActivity.done });
                }} style={{
                  marginTop: 16, width: "100%", padding: 12, borderRadius: 10, border: "none",
                  background: expandedActivity.done ? "#F0F0F0" : "#27AE60",
                  color: expandedActivity.done ? "#666" : "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer"
                }}>{expandedActivity.done ? "Mark Not Done" : "✓ Mark Done"}</button>
              )}
              <button onClick={() => {
                const deleteType = isChore ? "chore" : "activity";
                setConfirmDelete({ type: deleteType, item: expandedActivity });
                setExpandedActivity(null);
              }} style={{
                marginTop: 8, width: "100%", padding: 12, borderRadius: 10, border: "1px solid #E74C3C",
                background: "#fff", color: "#E74C3C", fontSize: 14, fontWeight: 600, cursor: "pointer"
              }}>Delete {isChore ? "Chore" : "Activity"}</button>
            </div>
          );
        })()}
      </Modal>

      {/* ── Delete Confirm Modal ── */}
      <Modal open={!!confirmDelete} onClose={() => setConfirmDelete(null)} title="Delete this item?">
        <p style={{ fontSize: 14, color: "#666", marginBottom: 16 }}>
          This will permanently remove <strong>{confirmDelete?.item?.title || confirmDelete?.item?.note}</strong>. This can't be undone.
        </p>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => setConfirmDelete(null)} style={{
            flex: 1, padding: 12, borderRadius: 10, border: "1px solid #ddd",
            background: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", color: "#666"
          }}>Cancel</button>
          <button onClick={deleteItem} style={{
            flex: 1, padding: 12, borderRadius: 10, border: "none",
            background: "#E74C3C", color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer"
          }}>Delete</button>
        </div>
      </Modal>

      {/* ── Add Modal ── */}
      <Modal open={showAddModal} onClose={() => setShowAddModal(false)} title={`Add ${addType === "reward" ? "Bonus / Penalty" : addType === "chore" ? "Chore" : "Activity"}`}>
        <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
          {["activity", "chore", "reward"].map(t => (
            <button key={t} onClick={() => setAddType(t)} style={{
              flex: 1, padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer",
              fontSize: 12, fontWeight: 600, textTransform: "capitalize",
              background: addType === t ? "#2D3436" : "#F0F0F0",
              color: addType === t ? "#fff" : "#666"
            }}>{t}</button>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div>
            <label style={labelStyle}>{addType === "reward" ? "Description" : "Title"}</label>
            <input value={formTitle} onChange={e => setFormTitle(e.target.value)} placeholder={addType === "activity" ? "e.g. Soccer Practice" : addType === "chore" ? "e.g. Feed the Dog" : "e.g. Extra yard work"} style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>Assign to</label>
            <select value={formPerson} onChange={e => setFormPerson(e.target.value)} style={selectStyle}>
              {(addType === "reward" ? FAMILY.filter(f => f.role === "kid") : FAMILY).map(f => (
                <option key={f.id} value={f.id}>{f.emoji} {f.name}</option>
              ))}
            </select>
          </div>
          <div>
            <label style={labelStyle}>Date</label>
            <input type="date" value={formDate} onChange={e => setFormDate(e.target.value)} style={inputStyle} />
          </div>
          {addType === "activity" && (
            <>
              <div>
                <label style={labelStyle}>Type</label>
                <select value={formType} onChange={e => setFormType(e.target.value)} style={selectStyle}>
                  {Object.entries(TYPE_COLORS).filter(([k]) => k !== "chore").map(([k, v]) => (
                    <option key={k} value={k}>{v.icon} {v.label}</option>
                  ))}
                </select>
              </div>
              <div>
                <label style={labelStyle}>Time</label>
                <input value={formTime} onChange={e => setFormTime(e.target.value)} placeholder="9:00 AM" style={inputStyle} />
              </div>
              <div>
                <label style={labelStyle}>Needs (shirt, lunch, supplies…)</label>
                <input value={formNeeds} onChange={e => setFormNeeds(e.target.value)} placeholder="e.g. Pack sack lunch, wear blue shirt" style={inputStyle} />
              </div>
            </>
          )}
          {addType === "chore" && (
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>$ Value</label>
                <input value={formValue} onChange={e => setFormValue(e.target.value)} placeholder="1.00" style={inputStyle} />
              </div>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>Frequency</label>
                <select value={formFreq} onChange={e => setFormFreq(e.target.value)} style={selectStyle}>
                  <option value="daily">Daily</option>
                  <option value="weekly">Weekly</option>
                  <option value="one-time">One-time</option>
                </select>
              </div>
            </div>
          )}
          {addType === "reward" && (
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>Amount ($)</label>
                <input value={formValue} onChange={e => setFormValue(e.target.value)} placeholder="2.00" style={inputStyle} />
              </div>
              <div style={{ flex: 1 }}>
                <label style={labelStyle}>Type</label>
                <select value={formRewardType} onChange={e => setFormRewardType(e.target.value)} style={selectStyle}>
                  <option value="bonus">Bonus</option>
                  <option value="penalty">Penalty</option>
                </select>
              </div>
            </div>
          )}
          <button onClick={handleAdd} style={{
            width: "100%", padding: 14, borderRadius: 12, border: "none",
            background: "#2D3436", color: "#fff", fontSize: 15, fontWeight: 700,
            cursor: "pointer", marginTop: 4
          }}>Add {addType === "reward" ? "Entry" : addType.charAt(0).toUpperCase() + addType.slice(1)}</button>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FamilyHub />);
</script>
</body>
</html>
